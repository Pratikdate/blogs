---
layout: default
---
<article class="blog-post slide-up">
    <a href="{{ site.baseurl }}/" class="back-link back-link-top">&larr; Back to writing</a>
    <header class="blog-header">
        <h1 class="blog-title">{{ page.title | default: page.name }}</h1>
        <div class="blog-meta">
            {% if page.date %}
            <time class="blog-date" datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%b %-d, %Y" }}</time>
            {% endif %}
        </div>
    </header>
    
    <div class="blog-content">
        {{ content }}
    </div>
    
    <div class="blog-footer">
        <a href="{{ site.baseurl }}/" class="back-link">&larr; Back to writing</a>
        <div class="blog-actions">
            <button class="like-button" aria-label="Like this post" onclick="this.classList.toggle('liked'); this.querySelector('.like-count').innerText = this.classList.contains('liked') ? 'Liked' : 'Like'">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="heart-icon">
                    <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                </svg>
                <span class="like-count">Like</span>
            </button>
        </div>
    </div>
</article>
