<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: site.name }}</title>
    <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | truncatewords: 25 }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=Inter:wght@400;500;600&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/style.css">
</head>
<body class="split-magazine-theme">
    <div class="split-layout">
        <aside class="sidebar fade-in" id="sidebar">
            <button id="sidebar-toggle" class="sidebar-toggle" aria-label="Toggle Sidebar">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
            </button>
            <div class="sidebar-inner">
                <div class="brand">
                    <a href="{{ site.baseurl }}/" class="logo">Pratik's Blogs</a>
                    <p class="bio">Software engineer, minimalist, and writer. Exploring the intersection of code, design, and clear thinking.</p>
                </div>
                
                <nav class="nav-links">
                    <a href="{{ site.baseurl }}/" class="active">Writing</a>
                    <a href="https://github.com/Pratikdate" target="_blank">About</a>
                    <a href="https://github.com/Pratikdate" target="_blank">Projects</a>
                    <a href="https://www.linkedin.com/in/pratik-date-883023244/" target="_blank">LinkedIn</a>
                    <a href="https://wa.me/pratik_date" target="_blank">WhatsApp</a>
                </nav>
                
                <footer class="sidebar-footer">
                    <p>&copy; 2026 Pratik.<br>Keep building.</p>
                </footer>
            </div>
        </aside>

        <main class="content-pane fade-in">
            {{ content }}
        </main>
    </div>
    <script src="{{ site.baseurl }}/assets/js/main.js"></script>
</body>
</html>
