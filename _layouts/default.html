<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: site.name }}</title>
    <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | truncatewords: 25 }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/style.css">
</head>
<body class="clear-moon-theme">
    <div class="glass-bg"></div>
    <header class="header">
        <nav class="nav-container fade-in">
            <a href="{{ site.baseurl }}/" class="logo">Clear Moon Blog</a>
            <div class="nav-links">
                <a href="{{ site.baseurl }}/">Home</a>
                <a href="https://github.com/shanacoder" target="_blank">About</a>
            </div>
        </nav>
    </header>

    <main class="main-content">
        {{ content }}
    </main>

    <footer class="footer fade-in">
        <p>&copy; 2026 Clear Moon Blog. Powered by GitHub Pages.</p>
    </footer>

    <script src="{{ site.baseurl }}/assets/js/main.js"></script>
</body>
</html>
