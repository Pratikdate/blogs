<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: site.name }}</title>
    <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | truncatewords: 25 }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Lora for beautiful serif headers, Inter for clean UI text -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/style.css">
</head>
<body class="clean-paper-theme">
    <div class="site-wrapper">
        <header class="header fade-in">
            <nav class="nav-container">
                <a href="{{ site.baseurl }}/" class="logo">Pratik's Blogs</a>
                <div class="nav-links">
                    <a href="{{ site.baseurl }}/">Writing</a>
                    <a href="https://github.com/Pratikdate" target="_blank">About</a>
                </div>
            </nav>
        </header>

        <main class="main-content">
            {{ content }}
        </main>

        <footer class="footer fade-in">
            <p>&copy; 2026 Pratik. Keep building.</p>
        </footer>
    </div>
    <script src="{{ site.baseurl }}/assets/js/main.js"></script>
</body>
</html>
