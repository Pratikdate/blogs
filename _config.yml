name: "Pratik's Blogs"
description: "Programming essays, thoughts, and notes."
baseurl: "/blogs" # The repository name is blogs
url: "https://pratikdate.github.io"

collections:
  blogs:
    output: true
    permalink: /blogs/:name/

defaults:
  - scope:
      path: ""
      type: "blogs"
    values:
      layout: "blog"
